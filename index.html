<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Graph Playground</title>

<link rel="stylesheet" href="styles.css" />

<!-- Math.js -->
<script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.js"></script>

<!-- Firebase (Modular SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js"></script>
</head>
<body data-theme="dark">
<div id="app">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="brand">Graph Playground</div>
    <div class="spacer"></div>

    <label class="small-muted">Theme</label>
    <select id="themeSel">
      <option value="dark" selected>Dark</option>
      <option value="light">Light</option>
    </select>

    <div id="userArea" class="user-area"></div>
    <button id="logoutBtn" class="btn danger small hidden">Logout</button>
  </header>

  <!-- AUTH VIEW -->
  <section id="authView" class="view">
    <div class="card auth-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <div id="tab-login" class="tab-content active">
        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />
        <button id="loginBtn" class="btn accent full">Log In</button>
        <div id="loginMsg" class="msg"></div>
      </div>

      <div id="tab-register" class="tab-content">
        <input id="regName" type="text" placeholder="Full name" />
        <input id="regEmail" type="email" placeholder="Email" />
        <input id="regPassword" type="password" placeholder="Password (min 6)" />
        <button id="registerBtn" class="btn accent full">Create Account</button>
        <div id="registerMsg" class="msg"></div>
      </div>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboardView" class="view hidden">
    <div class="toolbar">
      <button id="newPlaygroundBtn" class="btn accent">New Playground</button>
    </div>

    <div class="columns">
      <div class="col">
        <h3>My Playgrounds</h3>
        <div id="myList" class="list"></div>
      </div>

      <div class="col">
        <h3>Shared With Me</h3>
        <div id="sharedList" class="list"></div>
      </div>
    </div>
  </section>

  <!-- EDITOR -->
  <section id="editorView" class="view hidden">
    <div class="editor-layout">

      <!-- LEFT SIDEBAR -->
      <aside class="left">

        <div class="group">
          <div class="row spread">
            <input id="pgName" class="title-input" />
            <div class="row">
              <button id="saveBtn" class="btn small">Save</button>
              <button id="exportPngBtn" class="btn small">Export</button>
              <button id="backBtn" class="btn small">Back</button>
            </div>
          </div>
        </div>

        <!-- Add Layer Panel -->
        <div class="group">
          <h4>Add Layer</h4>

          <div class="tabs small">
            <button class="tab small active" data-tab="explicit">Explicit</button>
            <button class="tab small" data-tab="parametric">Parametric</button>
            <button class="tab small" data-tab="polar">Polar</button>
            <button class="tab small" data-tab="implicit">Implicit</button>
            <button class="tab small" data-tab="inequality">Inequality</button>
            <button class="tab small" data-tab="points">Points</button>
          </div>

          <!-- EXPLICIT -->
          <div id="panel-explicit" class="panel active">
            <div class="palette">
              <div class="label">Functions</div>
              <div class="chips" id="fnPalette"></div>
            </div>
            <input id="exprInput" type="text" placeholder="e.g. sin(x) + cos(2x)/2" />
            <div class="row tight">
              <label>Domain Xmin <input id="exXmin" type="number" step="any" value="-10"></label>
              <label>Xmax <input id="exXmax" type="number" step="any" value="10"></label>
              <label>Samples <input id="exSamples" type="number" min="200" max="20000" value="1200"></label>
            </div>
            <button id="addExplicitBtn" class="btn accent">Add</button>
          </div>

          <!-- PARAMETRIC -->
          <div id="panel-parametric" class="panel">
            <input id="pxInput" type="text" placeholder="x(t) e.g. (2+cos(5t))*cos(t)" />
            <input id="pyInput" type="text" placeholder="y(t) e.g. (2+cos(5t))*sin(t)" />
            <div class="row tight">
              <label>t min <input id="ptMin" type="number" step="any" value="0"></label>
              <label>t max <input id="ptMax" type="number" step="any" value="6.28318"></label>
              <label>Samples <input id="ptSamples" type="number" min="200" max="20000" value="2000"></label>
            </div>
            <button id="addParamBtn" class="btn accent">Add</button>
          </div>

          <!-- POLAR -->
          <div id="panel-polar" class="panel">
            <input id="prInput" type="text" placeholder="r(θ) e.g. 2*sin(5*theta)" />
            <div class="row tight">
              <label>θ min <input id="poMin" type="number" step="any" value="0"></label>
              <label>θ max <input id="poMax" type="number" step="any" value="6.28318"></label>
              <label>Samples <input id="poSamples" type="number" min="200" max="20000" value="2000"></label>
            </div>
            <button id="addPolarBtn" class="btn accent">Add</button>
          </div>

          <!-- IMPLICIT -->
          <div id="panel-implicit" class="panel">
            <input id="imInput" type="text" placeholder="F(x,y)=0 e.g. x^2 + y^2 - 9" />
            <div class="row tight">
              <label>Grid <input id="imGrid" type="number" min="50" max="600" value="200"></label>
              <label>Stroke <input id="imStroke" type="number" min="1" max="4" value="2"></label>
            </div>
            <button id="addImplicitBtn" class="btn accent">Add</button>
          </div>

          <!-- INEQUALITY -->
          <div id="panel-inequality" class="panel">
            <input id="iqInput" type="text" placeholder="g(x) OR F(x,y) <= 0 (e.g., y <= sin(x) OR x^2 + y^2 - 4 <= 0)" />
            <div class="row tight">
              <label>Grid <input id="iqGrid" type="number" min="50" max="600" value="160"></label>
              <label>Opacity <input id="iqAlpha" type="number" min="0.05" max="1" step="0.05" value="0.25"></label>
            </div>
            <button id="addIneqBtn" class="btn accent">Add</button>
          </div>

          <!-- POINTS -->
          <div id="panel-points" class="panel">
            <textarea id="ptsInput" placeholder="CSV x,y per line"></textarea>
            <button id="addPointsBtn" class="btn accent">Add points</button>
          </div>
        </div>

        <!-- Layers -->
        <div class="group">
          <h4>Layers</h4>
          <div id="layers" class="layers"></div>
        </div>

        <!-- View -->
        <div class="group">
          <h4>View</h4>
          <div class="row tight">
            <label>Xmin <input id="xmin" type="number" step="any" value="-10"></label>
            <label>Xmax <input id="xmax" type="number" step="any" value="10"></label>
            <label>Ymin <input id="ymin" type="number" step="any" value="-6"></label>
            <label>Ymax <input id="ymax" type="number" step="any" value="6"></label>
          </div>
          <div class="row">
            <button id="fitBtn" class="btn small">Fit</button>
            <button id="resetViewBtn" class="btn small">Reset</button>
            <button id="toggleGridBtn" class="btn small">Grid</button>
            <button id="toggleTicksBtn" class="btn small">Ticks</button>
            <button id="toggleCrosshairBtn" class="btn small">Crosshair</button>
          </div>
        </div>

        <!-- Share -->
        <div class="group">
          <h4>Share</h4>
          <div class="row">
            <input id="inviteEmail" type="email" placeholder="Invite by email" />
            <button id="inviteBtn" class="btn small">Invite</button>
          </div>
        </div>

      </aside>

      <!-- CANVAS AREA -->
      <main class="right">
        <div class="canvas-wrap">
          <canvas id="canvas"></canvas>
          <div id="status" class="status">Ready</div>
        </div>

        <div class="overlay">
          <button id="zoomInBtn" class="btn small">+</button>
          <button id="zoomOutBtn" class="btn small">−</button>
        </div>
      </main>

    </div>
  </section>

</div>

<!-- App -->
<script src="app.js"></script>
</body>
</html>
